name: Bug report
description: Report a defect or unexpected behavior.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened
      description: A clear, concise description of the defect.
      placeholder: "When I run `spi up --env dev1`, ..."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact commands or steps that trigger the defect.
      placeholder: |
        1. `uv tool install <wheel-url>`
        2. `spi up --env dev1`
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "spi up should ..."
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: spi version
      description: Output of `spi --version`.
      placeholder: "spi 0.1.2"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - WSL
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output from the failing command, or paste a snippet of `spi status`.
      render: shell
