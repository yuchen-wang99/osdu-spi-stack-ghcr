name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "30 1 * * 0" # weekly, Sunday 01:30 UTC, to catch newly-published advisories

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload findings to the code-scanning dashboard
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
