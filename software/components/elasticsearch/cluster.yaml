# Elasticsearch cluster managed by ECK operator.
# 3 nodes across availability zones for HA.
apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: elasticsearch
  namespace: platform
  labels:
    app.kubernetes.io/managed-by: osdu-spi-stack
spec:
  version: 8.18.2
  # AKS Automatic Deployment Safeguards enforces the
  # uniqueServiceSelectors policy as Deny in user namespaces (platform,
  # foundation are not in the policy's excludedNamespaces). ECK's
  # default elasticsearch-es-http and elasticsearch-es-transport
  # services would share the same selectors and be rejected. Mirror the
  # sister Terraform repo's pattern
  # (../osdu-spi-infra/main/software/spi-stack/modules/elastic/main.tf):
  # override both services' selectors with a distinct discriminator
  # label, and stamp both labels on the pod template so both services
  # still match the same pods.
  http:
    service:
      spec:
        selector:
          common.k8s.elastic.co/type: elasticsearch
          elasticsearch.k8s.elastic.co/cluster-name: elasticsearch
          elasticsearch.service/http: "true"
    tls:
      selfSignedCertificate: {}
  transport:
    service:
      spec:
        selector:
          common.k8s.elastic.co/type: elasticsearch
          elasticsearch.k8s.elastic.co/cluster-name: elasticsearch
          elasticsearch.service/transport: "true"
  nodeSets:
    - name: default
      count: 3
      config:
        node.roles: ["master", "data", "ingest"]
        node.store.allow_mmap: false
      podTemplate:
        metadata:
          labels:
            elasticsearch.service/http: "true"
            elasticsearch.service/transport: "true"
        spec:
          tolerations:
            - effect: NoSchedule
              key: workload
              value: "platform"
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: agentpool
                        operator: In
                        values:
                          - platform
          securityContext:
            fsGroup: 1000
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: elasticsearch
              resources:
                requests:
                  cpu: 500m
                  memory: 2Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  elasticsearch.k8s.elastic.co/cluster-name: elasticsearch
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            storageClassName: es-storageclass
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 128Gi
