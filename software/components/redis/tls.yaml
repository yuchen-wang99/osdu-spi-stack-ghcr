# Self-signed CA and certificate for Redis TLS.
# Services import this CA into their Java truststore via init container.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: redis-selfsigned-issuer
  namespace: platform
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: redis-tls-cert
  namespace: platform
spec:
  # commonName + isCA required for the cert to be importable into a Java
  # keystore. Without a non-empty Subject DN, keytool rejects the cert as
  # "Input not an X.509 certificate" even though openssl parses it fine.
  commonName: redis
  isCA: true
  secretName: redis-tls-secret
  issuerRef:
    name: redis-selfsigned-issuer
    kind: Issuer
  dnsNames:
    # Flux's default releaseName is {namespace}-{name} so the Bitnami chart
    # creates services as platform-redis-master / platform-redis-replicas.
    - platform-redis-master.platform.svc.cluster.local
    - platform-redis-master.platform.svc
    - platform-redis-master
    - platform-redis-replicas.platform.svc.cluster.local
    - platform-redis-replicas.platform.svc
    - platform-redis-replicas
    # Keep the short-name aliases for scripts that may target them.
    - redis-master.platform.svc.cluster.local
    - redis-master.platform.svc
    - redis-master
  duration: 8760h  # 1 year
  renewBefore: 720h  # 30 days
