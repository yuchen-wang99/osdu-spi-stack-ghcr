apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: flux-system
spec:
  targetNamespace: platform
  interval: 30m
  chart:
    spec:
      chart: redis
      version: "24.1.3"
      sourceRef:
        kind: HelmRepository
        name: bitnami
  values:
    # Pin image to bitnamilegacy repo (Bitnami removes old tags from main repo)
    image:
      registry: docker.io
      repository: bitnamilegacy/redis
      tag: 8.2.1-debian-12-r0
    architecture: replication
    auth:
      enabled: true
      existingSecret: redis-credentials
      existingSecretPasswordKey: password
    tls:
      enabled: true
      # Clients speak TLS but do not present a client certificate. Without
      # this flag the Bitnami chart defaults to tls-auth-clients yes which
      # enforces mutual TLS and rejects Lettuce with "certificate_required".
      authClients: false
      existingSecret: redis-tls-secret
      certFilename: tls.crt
      certKeyFilename: tls.key
      certCAFilename: ca.crt
    master:
      count: 1
      containerPorts:
        redis: 6380
      persistence:
        enabled: true
        storageClass: redis-storageclass
        size: 8Gi
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
      podSecurityContext:
        enabled: true
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containerSecurityContext:
        enabled: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      tolerations:
        - effect: NoSchedule
          key: workload
          value: "platform"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: agentpool
                    operator: In
                    values:
                      - platform
    replica:
      replicaCount: 2
      containerPorts:
        redis: 6380
      persistence:
        enabled: true
        storageClass: redis-storageclass
        size: 8Gi
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
      podSecurityContext:
        enabled: true
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containerSecurityContext:
        enabled: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      tolerations:
        - effect: NoSchedule
          key: workload
          value: "platform"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: agentpool
                    operator: In
                    values:
                      - platform
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: replica
