apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: flux-system
spec:
  targetNamespace: foundation
  interval: 30m
  chart:
    spec:
      chart: trust-manager
      version: "v0.19.*"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  # Upstream default-install fails AKS Safeguards because trust-manager's
  # defaultPackage init container is emitted without resource requests.
  # We don't use the default-CAs feature (our Bundles source from Secrets),
  # so disable it to remove the offending init container entirely.
  values:
    crds:
      enabled: true
    defaultPackage:
      enabled: false
    # Trust namespace = where source Secrets/ConfigMaps are read from.
    # Our source CAs live in platform (Redis via cert-manager, Elasticsearch
    # via ECK), so trust-manager watches that namespace for sources.
    app:
      trust:
        namespace: platform
      # seccompProfile: RuntimeDefault (satisfies AKS Safeguards).
      # Pod/container securityContext are baked into the chart templates
      # with Safeguards-compliant defaults (runAsNonRoot, readOnlyRootFS,
      # all caps dropped, allowPrivilegeEscalation=false).
      securityContext:
        seccompProfileEnabled: true
      # Disable the metrics Service. The chart emits trust-manager and
      # trust-manager-metrics Services with identical selector
      # (app: trust-manager); AKS Deployment Safeguards' unique-selector
      # Gatekeeper policy rejects the second. We do not scrape trust-manager
      # metrics, so dropping the Service is safe.
      metrics:
        service:
          enabled: false
    # Allow Bundle targets to write Secret (not just ConfigMap) outputs,
    # scoped to just the two names the osdu services need.
    secretTargets:
      enabled: true
      authorizedSecrets:
        - redis-ca-cert
        - elastic-ca-cert
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
