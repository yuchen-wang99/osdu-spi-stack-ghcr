apiVersion: v1
kind: Service
metadata:
  name: {{ include "osdu-spi-service.serviceName" . }}
  labels:
    {{- include "osdu-spi-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "osdu-spi-service.selectorLabels" . | nindent 4 }}
