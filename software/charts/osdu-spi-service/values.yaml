# -- Image configuration
image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 1

# -- Container port the service listens on
containerPort: 8080

# -- Service account (created by CLI bootstrap)
serviceAccountName: workload-identity-sa

# -- ConfigMap mounted as envFrom (created by CLI bootstrap)
configMapRef: osdu-config

# -- Kubernetes Service
service:
  type: ClusterIP
  port: 80

# -- Health probes
probes:
  liveness:
    path: /actuator/health
    port: 8081
    initialDelaySeconds: 250
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /actuator/health
    port: 8081
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# -- Resource requests and limits
resources:
  requests:
    cpu: 300m
    memory: 896Mi
  limits:
    cpu: "1"
    memory: 1536Mi

# -- Extra environment variables (list of {name, value} objects)
env: []

# -- Extra init containers (for data download, etc.)
initContainers: []

# -- Extra volume mounts for the main container
volumeMounts: []

# -- Extra volumes
volumes: []

# -- Workload identity pod label
workloadIdentity: true

# -- Elasticsearch TLS init container (for search/indexer)
elasticTls: false

# -- Redis TLS -- import self-signed CA into Java truststore
redisTls: false

# -- Topology spread constraints
topologySpread: true

# -- Node scheduling (set via values override when nodepool isolation is enabled)
nodeSelector: {}
tolerations: []

# -- Pin Istio sidecar proxy image
istioProxyPin:
  enabled: false
  image: mcr.microsoft.com/oss/v2/istio/proxyv2:v1.28.3-2

# -- Application Insights connection string, applied to EVERY service.
#    core-lib-azure >= 2.5.6 ships LogCustomDimensionFilter, which reads the
#    App Insights request-telemetry context on every HTTP request with no null
#    guard; if App Insights is not initialized the context is null and the
#    service returns HTTP 500 on every request. AKS Automatic enabled App
#    Insights by default, but AKS Base does not, so we initialize the SDK here.
#    The default is a disabled/dummy key (telemetry goes to a non-routable
#    endpoint and fails silently -- nothing leaves the cluster). To enable real
#    Azure Monitor observability, override with a real connection string.
appInsightsConnectionString: "InstrumentationKey=00000000-0000-0000-0000-000000000000;IngestionEndpoint=https://localhost/"
appInsightsInstrumentationKey: "00000000-0000-0000-0000-000000000000"
