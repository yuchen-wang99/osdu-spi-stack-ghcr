# One ConfigMap with a partition.json key per partition. partition-init mounts
# this at /partition-records and selects the file matching its $PARTITION env.
#
# Property keys (cosmos-endpoint, sb-namespace, ...) are the semantic names
# every OSDU service reads from the partition record. Property values for
# `sensitive: true` properties are bare KV secret suffixes — partition-azure
# auto-prefixes the partition id at write time, so a value of "cosmos-endpoint"
# is stored as "{partition}-cosmos-endpoint" and dereferenced from KV under
# the caller's Workload Identity. Embedding the partition prefix here would
# double-prefix the lookup ("opendes-opendes-cosmos-endpoint") and break every
# downstream service that resolves the partition record.
#
# The connection-string and storage-key KV secrets hold the literal "DISABLED"
# because Workload Identity supplies credentials at runtime; they exist only
# to satisfy the partition record schema.
apiVersion: v1
kind: ConfigMap
metadata:
  name: osdu-spi-init-partition-records
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "osdu-spi-init.labels" . | nindent 4 }}
data:
{{- range $partition := .Values.partitions }}
  {{ $partition }}.json: |
    {
      "properties": {
        "compliance-ruleset": {
          "sensitive": false,
          "value": "shared"
        },
        "cosmos-connection": {
          "sensitive": true,
          "value": "cosmos-connection"
        },
        "cosmos-endpoint": {
          "sensitive": true,
          "value": "cosmos-endpoint"
        },
        "cosmos-primary-key": {
          "sensitive": true,
          "value": "cosmos-primary-key"
        },
        "sb-connection": {
          "sensitive": true,
          "value": "sb-connection"
        },
        "sb-namespace": {
          "sensitive": true,
          "value": "sb-namespace"
        },
        "storage-account-key": {
          "sensitive": true,
          "value": "storage-account-key"
        },
        "storage-account-name": {
          "sensitive": true,
          "value": "storage"
        },
        "storage-account-blob-endpoint": {
          "sensitive": true,
          "value": "storage-account-blob-endpoint"
        },
        "elastic-endpoint": {
          "sensitive": true,
          "value": "elastic-endpoint"
        },
        "elastic-username": {
          "sensitive": true,
          "value": "elastic-username"
        },
        "elastic-password": {
          "sensitive": true,
          "value": "elastic-password"
        },
        "elastic-ssl-enabled": {
          "sensitive": false,
          "value": "false"
        },
        "indexer-decimation-enabled": {
          "sensitive": false,
          "value": "true"
        }
      }
    }
{{- end }}
