# Shared scripts used by both partition-init and entitlements-init Jobs.
# Token acquisition mirrors software/stacks/osdu/schema-load/script.yaml:
# the AKS Workload Identity webhook exports AZURE_TENANT_ID, AZURE_CLIENT_ID,
# and AZURE_FEDERATED_TOKEN_FILE, which MSAL exchanges for a bearer token
# whose appid claim matches the OSDU UAMI. That appid is what partition-azure
# stores in TenantInfo.service-account and what entitlements authorises as
# bootstrap admin.
apiVersion: v1
kind: ConfigMap
metadata:
  name: osdu-spi-init-scripts
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "osdu-spi-init.labels" . | nindent 4 }}
data:
  auth.py: |
    """Workload Identity federated-token exchange for a v1.0 Azure AD token.

    OSDU services (entitlements-azure, partition-azure) read the caller's
    application id from the v1.0 `appid` claim. The Microsoft Identity v2.0
    endpoint emits `azp` instead and omits `appid`, so a token from
    MSAL.acquire_token_for_client(scopes=[".../.default"]) is rejected as
    "app-id=" by the OSDU log filter and fails authorization.

    We therefore POST directly to the v1.0 endpoint
    /{tenant}/oauth2/token with resource=https://management.azure.com/.
    The response carries `appid` and authorization succeeds.
    """
    import json
    import os
    import urllib.parse
    import urllib.request


    def get_token() -> str:
        tenant_id = os.environ["AZURE_TENANT_ID"]
        client_id = os.environ["AZURE_CLIENT_ID"]
        token_path = os.environ.get(
            "AZURE_FEDERATED_TOKEN_FILE",
            "/var/run/secrets/azure/tokens/azure-identity-token",
        )
        with open(token_path, "r") as fh:
            federated_token = fh.read().strip()

        data = urllib.parse.urlencode({
            "grant_type": "client_credentials",
            "client_id": client_id,
            "client_assertion_type": (
                "urn:ietf:params:oauth:client-assertion-type:jwt-bearer"
            ),
            "client_assertion": federated_token,
            "resource": "https://management.azure.com/",
        }).encode()
        req = urllib.request.Request(
            f"https://login.microsoftonline.com/{tenant_id}/oauth2/token",
            data=data,
            method="POST",
            headers={"Content-Type": "application/x-www-form-urlencoded"},
        )
        try:
            resp = urllib.request.urlopen(req, timeout=60)
            payload = json.loads(resp.read())
        except urllib.error.HTTPError as e:
            raise SystemExit(
                f"Token acquisition failed: {e.code} {e.read().decode(errors='replace')}"
            )
        if "access_token" not in payload:
            raise SystemExit(f"Token acquisition failed: {payload}")
        return payload["access_token"]
  wait.py: |
    """Poll an HTTP endpoint until it returns an expected status code."""
    import sys
    import time
    import urllib.request


    def wait_for_status(url: str, expected: set, attempts: int, delay: float) -> bool:
        for i in range(1, attempts + 1):
            try:
                code = urllib.request.urlopen(url, timeout=5).getcode()
            except urllib.error.HTTPError as e:
                code = e.code
            except Exception:
                code = 0
            if code in expected:
                print(f"  {url} -> {code} (after {i} attempt(s))")
                return True
            if i == 1 or i % 30 == 0:
                print(f"  {url} -> {code} (attempt {i}/{attempts})")
            time.sleep(delay)
        print(f"ERROR: {url} did not return {expected} after {attempts} attempts")
        return False
  init_partition.py: |
    """Register a partition record with the partition service.

    Flow:
      1. Wait for partition service /info to return 200.
      2. Acquire a bearer token via Workload Identity.
      3. POST /api/partition/v1/partitions/<PARTITION> with the partition
         record body from /partition-records/<PARTITION>.json.
      4. Treat 201 (created) and 409 (already exists) as success.
    """
    import json
    import os
    import sys
    import urllib.request

    sys.path.insert(0, "/scripts")
    from auth import get_token
    from wait import wait_for_status

    PARTITION = os.environ["PARTITION"]
    PARTITION_HOST = os.environ.get(
        "PARTITION_HOST", "http://partition.osdu.svc.cluster.local"
    )
    RECORD_PATH = f"/partition-records/{PARTITION}.json"

    INFO_URL = f"{PARTITION_HOST}/api/partition/v1/info"
    POST_URL = f"{PARTITION_HOST}/api/partition/v1/partitions/{PARTITION}"


    def main() -> int:
        print(f"Partition bootstrap for '{PARTITION}'")

        if not wait_for_status(INFO_URL, {200}, attempts=600, delay=2.0):
            return 1

        with open(RECORD_PATH, "r") as fh:
            body = fh.read()
        print(f"  Loaded partition record from {RECORD_PATH}")

        print("  Acquiring bearer token via Workload Identity...")
        token = get_token()

        req = urllib.request.Request(
            POST_URL,
            data=body.encode(),
            method="POST",
            headers={
                "Content-Type": "application/json",
                "Accept": "application/json",
                "Authorization": f"Bearer {token}",
                "data-partition-id": PARTITION,
            },
        )
        try:
            resp = urllib.request.urlopen(req, timeout=60)
            code = resp.getcode()
            print(f"  POST {POST_URL} -> {code}")
            print(resp.read().decode(errors="replace"))
        except urllib.error.HTTPError as e:
            code = e.code
            payload = e.read().decode(errors="replace")
            print(f"  POST {POST_URL} -> {code}")
            print(payload)
            if code == 409:
                print("  Partition already exists; treating as success.")
                return 0
            return 1
        return 0 if code in (200, 201) else 1


    if __name__ == "__main__":
        sys.exit(main())
  init_entitlements.py: |
    """Seed entitlements root groups for a partition.

    Flow:
      1. Wait for entitlements /info to return 200.
      2. Wait for GET /partitions/<PARTITION> to return 200 (partition-init
         for this partition must have landed first).
      3. Acquire a bearer token via Workload Identity.
      4. POST /api/entitlements/v2/tenant-provisioning with
         data-partition-id: <PARTITION>. This creates users.data.root and
         sibling root groups, adding the caller's appid as OWNER.
      5. Treat 200 and 409 as success.
    """
    import os
    import sys
    import urllib.request

    sys.path.insert(0, "/scripts")
    from auth import get_token
    from wait import wait_for_status

    PARTITION = os.environ["PARTITION"]
    ENTITLEMENTS_HOST = os.environ.get(
        "ENTITLEMENTS_HOST", "http://entitlements.osdu.svc.cluster.local"
    )
    PARTITION_HOST = os.environ.get(
        "PARTITION_HOST", "http://partition.osdu.svc.cluster.local"
    )

    INFO_URL = f"{ENTITLEMENTS_HOST}/api/entitlements/v2/info"
    PARTITION_GET_URL = f"{PARTITION_HOST}/api/partition/v1/partitions/{PARTITION}"
    POST_URL = f"{ENTITLEMENTS_HOST}/api/entitlements/v2/tenant-provisioning"


    def main() -> int:
        print(f"Entitlements bootstrap for '{PARTITION}'")

        if not wait_for_status(INFO_URL, {200}, attempts=600, delay=2.0):
            return 1

        # Gate on partition record existing. partition-init runs in parallel;
        # this loop waits until partition service reports the record.
        if not wait_for_status(
            PARTITION_GET_URL, {200, 401, 403}, attempts=300, delay=2.0
        ):
            # 401/403 can indicate the record exists but the GET endpoint
            # requires explicit auth; either way, it tells us partition-init
            # created the record.
            return 1

        print("  Acquiring bearer token via Workload Identity...")
        token = get_token()

        req = urllib.request.Request(
            POST_URL,
            data=b"",
            method="POST",
            headers={
                "Content-Type": "application/json",
                "Accept": "application/json",
                "Authorization": f"Bearer {token}",
                "data-partition-id": PARTITION,
            },
        )
        try:
            resp = urllib.request.urlopen(req, timeout=120)
            code = resp.getcode()
            print(f"  POST {POST_URL} -> {code}")
            print(resp.read().decode(errors="replace"))
        except urllib.error.HTTPError as e:
            code = e.code
            payload = e.read().decode(errors="replace")
            print(f"  POST {POST_URL} -> {code}")
            print(payload)
            if code == 409:
                print("  Tenant already provisioned; treating as success.")
                return 0
            return 1
        return 0 if code == 200 else 1


    if __name__ == "__main__":
        sys.exit(main())
