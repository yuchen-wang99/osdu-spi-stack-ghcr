# SPI Stack - Ingress profile: DNS (custom domain)
#
# Uses an existing Azure DNS zone in the current subscription.
# ExternalDNS syncs A records from HTTPRoute hostnames. cert-manager
# issues a Let's Encrypt cert per subdomain via HTTP-01. This profile is
# the sole owner of spi-gateway and declares HTTP:80 plus three HTTPS:443
# listeners, one per hostname (osdu / kibana / airflow).
#
# Required variables in spi-ingress-config ConfigMap (osdu-flux):
#   ACME_EMAIL, TXT_OWNER_ID, DNS_ZONE, DNS_ZONE_RG, AZURE_TENANT_ID,
#   EXTERNAL_DNS_CLIENT_ID, INGRESS_HOST_OSDU, INGRESS_HOST_KIBANA,
#   INGRESS_HOST_AIRFLOW.

---
# Cert issuers (Let's Encrypt staging + prod).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-cert-manager-issuers
  namespace: osdu-flux
  labels:
    spi-stack.layer: "1"
spec:
  interval: 10m
  dependsOn:
    - name: spi-cert-manager
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system
  path: ./software/components/cert-manager-issuers
  prune: true
  wait: true
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: spi-ingress-config

---
# ExternalDNS, reading HTTPRoute hostnames and syncing A records to
# the Azure DNS zone via Workload Identity.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-external-dns
  namespace: osdu-flux
  labels:
    spi-stack.layer: "1"
spec:
  interval: 10m
  dependsOn:
    - name: spi-namespaces
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system
  path: ./software/components/external-dns
  prune: true
  wait: true
  timeout: 10m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: spi-ingress-config

---
# Kibana serving at root on its own subdomain (no server.basePath).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-kibana
  namespace: osdu-flux
  labels:
    spi-stack.layer: "3"
spec:
  interval: 10m
  dependsOn:
    - name: spi-elasticsearch
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system
  path: ./software/components/kibana
  prune: true
  wait: true
  timeout: 10m

---
# Single owner for the HTTP/HTTPS Gateway and its three certificates.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-gateway
  namespace: osdu-flux
  labels:
    spi-stack.layer: "1"
spec:
  interval: 10m
  dependsOn:
    - name: spi-cert-manager-issuers
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system
  path: ./software/overlays/gateway-tls-multi-host
  prune: true
  wait: true
  timeout: 10m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: spi-ingress-config

---
# HTTPRoutes for OSDU APIs + middleware UIs on per-service hostnames.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-osdu-routes
  namespace: osdu-flux
  labels:
    spi-stack.layer: "6"
spec:
  interval: 10m
  dependsOn:
    - name: spi-osdu-services
    - name: spi-kibana
    - name: spi-gateway
    - name: spi-external-dns
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system
  path: ./software/stacks/osdu/routes/multi-host
  prune: true
  wait: true
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: spi-ingress-config
