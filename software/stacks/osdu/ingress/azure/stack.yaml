# SPI Stack - Ingress profile: AZURE (default)
#
# Uses Azure's auto-assigned <label>.<region>.cloudapp.azure.com FQDN.
# CLI patches the Istio ingress LB with service.beta.kubernetes.io/
# azure-dns-label-name=<cluster-name> before this stack reconciles.
# This profile is the sole owner of spi-gateway. It applies the HTTP:80
# listener, cert-manager issues a Let's Encrypt cert on the FQDN via
# HTTP-01, and the same Kustomization adds HTTPS:443. All OSDU APIs and
# middleware UIs (Kibana /kibana, Airflow /airflow) live under one host.
#
# Required variables in spi-ingress-config ConfigMap (osdu-flux):
#   ACME_EMAIL, INGRESS_FQDN, DNS_LABEL

---
# Cert issuers (Let's Encrypt staging + prod).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-cert-manager-issuers
  namespace: osdu-flux
  labels:
    spi-stack.layer: "1"
spec:
  interval: 10m
  dependsOn:
    - name: spi-cert-manager
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system
  path: ./software/components/cert-manager-issuers
  prune: true
  wait: true
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: spi-ingress-config

---
# Kibana with server.basePath=/kibana so it can serve from a subpath.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-kibana
  namespace: osdu-flux
  labels:
    spi-stack.layer: "3"
spec:
  interval: 10m
  dependsOn:
    - name: spi-elasticsearch
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system
  path: ./software/overlays/kibana-subpath
  prune: true
  wait: true
  timeout: 10m

---
# Single owner for the HTTP/HTTPS Gateway and its Let's Encrypt cert.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-gateway
  namespace: osdu-flux
  labels:
    spi-stack.layer: "1"
spec:
  interval: 10m
  dependsOn:
    - name: spi-cert-manager-issuers
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system
  path: ./software/overlays/gateway-tls-single-host
  prune: true
  wait: true
  timeout: 10m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: spi-ingress-config

---
# HTTPRoutes for OSDU APIs + middleware UIs on the single FQDN.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-osdu-routes
  namespace: osdu-flux
  labels:
    spi-stack.layer: "6"
spec:
  interval: 10m
  dependsOn:
    - name: spi-osdu-services
    - name: spi-kibana
    - name: spi-gateway
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system
  path: ./software/stacks/osdu/routes/single-host
  prune: true
  wait: true
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: spi-ingress-config
