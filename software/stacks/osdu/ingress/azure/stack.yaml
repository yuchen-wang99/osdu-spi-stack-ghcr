# SPI Stack - Ingress profile: AZURE (default)
#
# Uses Azure's auto-assigned <label>.<region>.cloudapp.azure.com FQDN.
# CLI patches the Istio ingress LB with service.beta.kubernetes.io/
# azure-dns-label-name=<cluster-name> before this stack reconciles.
# cert-manager issues a Let's Encrypt cert on the FQDN via HTTP-01 on
# the existing HTTP:80 listener; gateway-tls-single-host adds the
# HTTPS:443 listener referencing the cert Secret. All OSDU APIs and
# middleware UIs (Kibana /kibana, Airflow /airflow) live under one host.
#
# This test branch renders ingress values directly to avoid writing
# user-managed ConfigMaps into AKS Automatic's protected flux-system namespace.

---
# Cert issuers (Let's Encrypt staging + prod).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-cert-manager-issuers
  namespace: flux-system
  labels:
    spi-stack.layer: "1"
spec:
  interval: 10m
  dependsOn:
    - name: spi-cert-manager
    - name: spi-gateway
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system-v3
  path: ./software/components/cert-manager-issuers
  prune: true
  wait: true
  timeout: 5m

---
# Kibana with server.basePath=/kibana so it can serve from a subpath.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-kibana
  namespace: flux-system
  labels:
    spi-stack.layer: "3"
spec:
  interval: 10m
  dependsOn:
    - name: spi-elasticsearch
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system-v3
  path: ./software/overlays/kibana-subpath
  prune: true
  wait: true
  timeout: 10m

---
# HTTPS:443 listener with Let's Encrypt cert for the auto-FQDN.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-gateway-tls
  namespace: flux-system
  labels:
    spi-stack.layer: "1"
spec:
  interval: 10m
  dependsOn:
    - name: spi-cert-manager-issuers
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system-v3
  path: ./software/overlays/gateway-tls-single-host
  prune: true
  wait: true
  timeout: 10m

---
# HTTPRoutes for OSDU APIs + middleware UIs on the single FQDN.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-osdu-routes
  namespace: flux-system
  labels:
    spi-stack.layer: "6"
spec:
  interval: 10m
  dependsOn:
    - name: spi-osdu-services
    - name: spi-kibana
    - name: spi-gateway-tls
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system-v3
  path: ./software/stacks/osdu/routes/single-host
  prune: true
  wait: true
  timeout: 5m
