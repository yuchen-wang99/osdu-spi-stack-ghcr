# SPI Stack - Ingress profile: IP (bare IP, no TLS, debug only)
#
# Attaches a single Flux Kustomization that wires HTTPRoutes (no
# hostnames) to the existing HTTP:80 listener on spi-gateway. No
# cert-manager issuers, no ExternalDNS, no Kibana, no TLS overlay.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-osdu-routes
  namespace: flux-system
  labels:
    spi-stack.layer: "6"
spec:
  interval: 10m
  dependsOn:
    - name: spi-osdu-services
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system
  path: ./software/stacks/osdu/routes/ip-only
  prune: true
  wait: true
  timeout: 5m
