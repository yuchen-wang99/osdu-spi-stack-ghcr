# SPI Stack - Ingress profile: IP (bare IP, no TLS, debug only)
#
# Owns the HTTP-only spi-gateway and wires HTTPRoutes (no hostnames)
# to its HTTP:80 listener. No cert-manager issuers, no ExternalDNS,
# no Kibana, no TLS overlay.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-gateway
  namespace: osdu-flux
  labels:
    spi-stack.layer: "1"
spec:
  interval: 10m
  dependsOn:
    - name: spi-namespaces
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system
  path: ./software/components/gateway
  prune: true
  wait: true
  timeout: 5m

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spi-osdu-routes
  namespace: osdu-flux
  labels:
    spi-stack.layer: "6"
spec:
  interval: 10m
  dependsOn:
    - name: spi-osdu-services
    - name: spi-gateway
  sourceRef:
    kind: GitRepository
    name: osdu-spi-stack-system
  path: ./software/stacks/osdu/routes/ip-only
  prune: true
  wait: true
  timeout: 5m
