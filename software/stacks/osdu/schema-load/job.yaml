# One-shot Job that loads the OSDU shared schemas into the primary
# partition. Runs after the core OSDU services HelmReleases have been
# applied (see spi-osdu-schema-load Flux Kustomization in
# software/stacks/osdu/profiles/core/stack.yaml).
#
# Uses the existing `workload-identity-sa` in the `osdu` namespace,
# already federated to the OSDU UAMI (see infra/modules/identity.bicep).
# The AKS Workload Identity webhook injects AZURE_CLIENT_ID,
# AZURE_TENANT_ID, and AZURE_FEDERATED_TOKEN_FILE automatically when
# the pod carries the `azure.workload.identity/use: "true"` label and
# the SA has the matching annotations.
#
# The loader image's default entrypoint runs `bootstrap.sh` from
# /home/osdu/deployments/scripts/azure; we mount our wrapper over that
# path (and Token.py alongside it) rather than overriding `command`.
apiVersion: batch/v1
kind: Job
metadata:
  name: schema-load
  namespace: osdu
  labels:
    app.kubernetes.io/managed-by: osdu-spi-stack
    app.kubernetes.io/component: schema-load
spec:
  backoffLimit: 2
  # 60 min ceiling. The loader POSTs ~1,386 schemas; on a cold cluster the
  # backing Cosmos autoscales up from its 400 RU/s floor and throttles (429)
  # the initial burst, so the SDK retries with backoff and a single pass can
  # exceed 30 min even when the schema service is immediately ready. Note
  # activeDeadlineSeconds is a terminal Job deadline that overrides
  # backoffLimit (no retry once exceeded), so it must cover the throttled
  # worst case; 60 min does. Operators trigger a manual re-run with
  # kubectl delete job schema-load -n osdu (already-loaded schemas return
  # 409 and are skipped, so a re-run converges quickly).
  activeDeadlineSeconds: 3600
  # No ttlSecondsAfterFinished: this is a one-shot loader. Flux
  # reconciles this Kustomization every 10 min; a TTL would let the
  # controller delete the completed Job and the next reconcile would
  # re-apply it, turning a one-shot into a periodic re-run. Operators
  # trigger re-runs manually (kubectl delete job schema-load -n osdu).
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: osdu-spi-stack
        app.kubernetes.io/component: schema-load
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: workload-identity-sa
      restartPolicy: Never
      nodeSelector:
        agentpool: osdu
      tolerations:
        - key: workload
          operator: Equal
          value: "osdu"
          effect: NoSchedule
      volumes:
        - name: scripts
          configMap:
            name: schema-load-scripts
            defaultMode: 0755
      containers:
        - name: loader
          image: community.opengroup.org:5555/osdu/platform/system/schema-service/schema-service-schema-load-master:df3e78629f7e398cbda86d93946e49b011076d8f
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: osdu-config
          env:
            - name: NAMESPACE
              value: "osdu"
            # The OSDU community schema-load image's bootstrap.sh reads
            # ${DATA_PARTITION}. The osdu-config ConfigMap exposes the
            # primary partition as PRIMARY_PARTITION (renamed to make
            # multi-partition deploys honest); alias it back to the env
            # name the loader expects. system-db is primary-only by
            # design (ADR-013), so loading against the primary is correct.
            - name: DATA_PARTITION
              valueFrom:
                configMapKeyRef:
                  name: osdu-config
                  key: PRIMARY_PARTITION
          volumeMounts:
            - name: scripts
              mountPath: /home/osdu/deployments/scripts/azure/bootstrap.sh
              subPath: bootstrap.sh
            - name: scripts
              mountPath: /home/osdu/deployments/scripts/azure/Token.py
              subPath: Token.py
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "test -f /proc/1/status"]
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "test -f /proc/1/status"]
            periodSeconds: 30
            failureThreshold: 3
