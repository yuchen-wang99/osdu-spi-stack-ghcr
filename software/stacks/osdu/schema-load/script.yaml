# Wrapper script and MSAL token helper mounted into the community
# schema-load image.
#
# The image's default entrypoint runs `bootstrap.sh` from
# /home/osdu/deployments/scripts/azure. We override bootstrap.sh with
# our wrapper (init.sh) that:
#   1. Waits for the schema service to respond 200 on /info
#   2. Fetches a bearer token via Workload Identity + MSAL (Token.py)
#   3. Invokes the image-bundled DeploySharedSchemas.py to POST schemas
#   4. Treats "schema already exists" failures as success so re-runs
#      do not fail the Job
#
# Token.py is an adapted copy of the osdu-developer equivalent; the
# scope is `management.azure.com/.default`, which the schema service
# validates by `appid` rather than by audience.
apiVersion: v1
kind: ConfigMap
metadata:
  name: schema-load-scripts
  namespace: osdu
  labels:
    app.kubernetes.io/managed-by: osdu-spi-stack
    app.kubernetes.io/component: schema-load
data:
  bootstrap.sh: |
    #!/usr/bin/env sh
    set -u

    AZURE_SCHEMA_URL="http://schema.osdu.svc.cluster.local/api/schema-service/v1/schemas/system"
    SCHEMA_INFO_URL="http://schema.osdu.svc.cluster.local/api/schema-service/v1/info"
    export AZURE_SCHEMA_URL

    # Wait up to ~20 min for the schema service to return 200 on /info.
    # spi-osdu-services runs with wait:false so Flux marks it Ready as soon
    # as HelmReleases are applied, not when they are serving. On a fresh
    # cluster the schema pod may still be pulling its image when this Job
    # starts; 600 attempts * 2s gives enough headroom.
    #
    # The probe uses Python's urllib rather than curl: the image's
    # bundled curl has a libcurl/libssh2 ABI mismatch
    # (undefined symbol: libssh2_session_callback_set2) and exits
    # immediately with a symbol lookup error.
    echo "Waiting for schema service at ${SCHEMA_INFO_URL}..."
    attempts=0
    until python - <<PY 2>/dev/null
    import sys, urllib.request
    try:
        code = urllib.request.urlopen("${SCHEMA_INFO_URL}", timeout=5).getcode()
    except Exception:
        code = 0
    sys.exit(0 if code == 200 else 1)
    PY
    do
      attempts=$((attempts + 1))
      if [ "${attempts}" -ge 600 ]; then
        echo "ERROR: schema service did not return 200 after ${attempts} attempts"
        exit 1
      fi
      sleep 2
    done
    echo "Schema service ready (after ${attempts} attempts)."

    echo "Acquiring bearer token via Workload Identity..."
    BEARER_TOKEN=$(python "${AZURE_DEPLOYMENTS_SUBDIR}/Token.py")
    if [ -z "${BEARER_TOKEN}" ]; then
      echo "ERROR: failed to acquire bearer token"
      exit 1
    fi
    export BEARER_TOKEN

    # Redirect-then-cat instead of a pipe so $? captures the Python exit
    # status, not tee's. In POSIX shells the last command in a pipeline
    # owns $?, which would silently mask a failing schema load.
    echo "Loading schemas for partition '${DATA_PARTITION}'..."
    python "${AZURE_DEPLOYMENTS_SCRIPTS_SUBDIR}/DeploySharedSchemas.py" -u "${AZURE_SCHEMA_URL}" >/tmp/load.log 2>&1
    ret=$?
    cat /tmp/load.log

    if [ "${ret}" -ne 0 ]; then
      if grep -qE 'already exists|already PUBLISHED|SCHEMA_EXISTS' /tmp/load.log; then
        echo "Non-zero exit but only 'already exists' failures detected; treating as success."
        exit 0
      fi
      echo "Schema load failed with exit code ${ret}."
      exit "${ret}"
    fi
    echo "Schema load completed successfully."
  Token.py: |
    """MSAL federated-token exchange for Workload Identity.

    Reads AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_FEDERATED_TOKEN_FILE
    (injected by the AKS Workload Identity webhook) and prints a bearer
    token suitable for the OSDU schema-service. The schema service
    validates by appid, not audience, so we request the
    management.azure.com scope which is always resolvable.
    """
    import os
    import msal


    def main():
        tenant_id = os.getenv("AZURE_TENANT_ID")
        client_id = os.getenv("AZURE_CLIENT_ID")
        token_path = os.getenv(
            "AZURE_FEDERATED_TOKEN_FILE",
            "/var/run/secrets/azure/tokens/azure-identity-token",
        )

        if not tenant_id or not client_id:
            raise SystemExit(
                "AZURE_TENANT_ID and AZURE_CLIENT_ID are required"
            )

        with open(token_path, "r") as fh:
            federated_token = fh.read().strip()

        authority = f"https://login.microsoftonline.com/{tenant_id}"
        app = msal.ConfidentialClientApplication(
            client_id=client_id,
            authority=authority,
            client_credential={
                "client_assertion_type": (
                    "urn:ietf:params:oauth:client-assertion-type:jwt-bearer"
                ),
                "client_assertion": federated_token,
            },
        )

        result = app.acquire_token_for_client(
            scopes=["https://management.azure.com/.default"]
        )
        if "access_token" not in result:
            raise SystemExit(
                f"Token acquisition failed: {result.get('error_description', result)}"
            )
        print(f"Bearer {result['access_token']}")


    if __name__ == "__main__":
        main()
