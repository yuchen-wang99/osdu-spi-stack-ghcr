apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: osdu-spi-init
  namespace: osdu-flux
spec:
  targetNamespace: osdu
  interval: 30m
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    remediation:
      retries: 3
  chart:
    spec:
      chart: ./software/charts/osdu-spi-init
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: osdu-spi-stack-system
  # Partition list and creator identities are injected by the CLI via the
  # spi-init-values ConfigMap in osdu-flux. Revision reconciliation picks up
  # source changes, while ordered hooks with before-hook-creation rerun the
  # immutable init Jobs safely when the chart or creator values change.
  valuesFrom:
    - kind: ConfigMap
      name: spi-init-values
      valuesKey: values.yaml
