apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: osdu-spi-init
  namespace: flux-system
spec:
  targetNamespace: osdu
  interval: 30m
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    remediation:
      retries: 3
  chart:
    spec:
      chart: ./software/charts/osdu-spi-init
      sourceRef:
        kind: GitRepository
        name: osdu-spi-stack-system
  # Partition list is injected by the CLI via the spi-init-values ConfigMap
  # in flux-system (written by src/spi/deploy.py::_create_spi_init_values).
  # Flipping multi-partition on is a --partition CLI flag change; no edits to
  # this file are required.
  valuesFrom:
    - kind: ConfigMap
      name: spi-init-values
      valuesKey: values.yaml
