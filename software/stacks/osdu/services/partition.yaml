apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: partition
  namespace: osdu-flux
spec:
  targetNamespace: osdu
  interval: 30m
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    remediation:
      retries: 3
  chart:
    spec:
      chart: ./software/charts/osdu-spi-service
      sourceRef:
        kind: GitRepository
        name: osdu-spi-stack-system
  values:
    image:
      repository: ${PARTITION_IMAGE_REPOSITORY}
      tag: "${PARTITION_IMAGE_TAG}"
    redisTls: true
    nodeSelector:
      agentpool: osdu
    tolerations:
      - key: workload
        operator: Equal
        value: "osdu"
        effect: NoSchedule
    env:
      - name: SPRING_APPLICATION_NAME
        value: partition
      - name: SERVER_SERVLET_CONTEXTPATH
        value: /api/partition/v1/
      - name: ACCEPT_HTTP
        value: "true"
      - name: AZURE_ISTIOAUTH_ENABLED
        value: "true"
      - name: AZURE_PAAS_WORKLOADIDENTITY_ISENABLED
        value: "true"
      - name: REDIS_DATABASE
        value: "1"
      # Override the OSDU image default redis.expiration=3600 (1h). The partition
      # list cache (getAllPartitions) caches an empty result if it is queried
      # before partition-init creates the partition; a short TTL lets that stale
      # entry self-heal within ~2 min, so indexer-queue (which re-lists every 60s)
      # discovers the partition and starts indexing without a manual restart.
      - name: REDIS_EXPIRATION
        value: "120"
      - name: PARTITION_SPRING_LOGGING_LEVEL
        value: DEBUG
