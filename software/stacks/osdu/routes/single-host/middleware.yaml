apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kibana
  namespace: osdu
spec:
  parentRefs:
    - name: spi-gateway
      namespace: aks-istio-ingress
  hostnames:
    - "${INGRESS_FQDN}"
  rules:
    - matches:
        - path: { type: PathPrefix, value: /kibana }
      backendRefs:
        - group: ""
          kind: Service
          name: kibana-kb-http
          namespace: platform
          port: 5601
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: airflow
  namespace: osdu
spec:
  parentRefs:
    - name: spi-gateway
      namespace: aks-istio-ingress
  hostnames:
    - "${INGRESS_FQDN}"
  rules:
    - matches:
        - path: { type: PathPrefix, value: /airflow }
      backendRefs:
        - group: ""
          kind: Service
          name: airflow-webserver
          namespace: platform
          port: 8080
