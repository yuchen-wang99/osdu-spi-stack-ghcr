# Placeholder: The osdu-config ConfigMap and workload-identity-sa ServiceAccount
# are created by the SPI CLI during bootstrap (before GitOps starts).
# This file exists to document the dependency. The actual ConfigMap contains
# Azure PaaS connection endpoints (CosmosDB, Service Bus, Storage, Key Vault)
# populated from the infrastructure provisioning outputs.
#
# Required ConfigMap keys (injected by CLI):
#   DOMAIN, PRIMARY_PARTITION, AZURE_TENANT_ID, AAD_CLIENT_ID,
#   KEYVAULT_URI, KEYVAULT_URL, KEYVAULT_NAME,
#   PRIMARY_COSMOSDB_ENDPOINT, COSMOSDB_DATABASE,
#   PRIMARY_STORAGE_ACCOUNT_NAME, PRIMARY_SERVICEBUS_NAMESPACE,
#   REDIS_HOSTNAME, REDIS_PORT, SERVER_PORT,
#   APPINSIGHTS_KEY, ELASTICSEARCH_HOST
#
# PRIMARY_* keys carry the primary partition's data plane endpoints. OSDU
# services route per-request via partition-service; these keys exist for
# the schema-load Job (system-db is primary-only by design, ADR-013) and
# for operator visibility.
