apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: osdu-tls
  namespace: aks-istio-ingress
  labels:
    app.kubernetes.io/managed-by: osdu-spi-stack
spec:
  secretName: osdu-tls
  dnsNames:
    - "spi-stack-dev1-ingress.canadacentral.cloudapp.azure.com"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
